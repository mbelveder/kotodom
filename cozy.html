<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Котоши — собери домик</title>
<style>
  :root{
    --sky:#C3E6F2; --panel:#47B2E5; --panel-deep:#2B97CE; --dock:#2490C9;
    --card:#FFFFFF; --card-line:#D9EBF5; --title:#2BA8A2; --body:#8F877C; --ink:#4A3F35;
    --cream:#FFF4D6; --cream-line:#EFCF83;
    --mint:#4EC7A8; --mint-deep:#3BAE91;
    --wood-top:#F0D6A5; --wood-r:#DFBB85; --wood-l:#C79C69; --line:#6E523C;
    --roof:#E8794F; --roof-dark:#C75A38;
    --fs-round: ui-rounded, "SF Pro Rounded", "Arial Rounded MT Bold", system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ margin:0; font-family:var(--fs-round); background:var(--sky); overflow:hidden;
        -webkit-font-smoothing:antialiased; user-select:none; }
  button{ font-family:inherit; border:none; cursor:pointer; background:none; padding:0; }
  button:focus-visible{ outline:3px solid #1D7FB5; outline-offset:2px; border-radius:14px; }

  #app{ position:fixed; inset:0; display:flex; flex-direction:column; }

  /* ---------- scene ---------- */
  #scene-wrap{ position:absolute; inset:0; }
  #scene{ width:100%; height:100%; display:block; }
  .module{ cursor:pointer; }
  .module.pop{ animation:pop .5s cubic-bezier(.34,1.6,.64,1) both; transform-box:fill-box; transform-origin:50% 100%; }
  @keyframes pop{ 0%{ transform:scale(.1);} 70%{ transform:scale(1.12);} 100%{ transform:scale(1);} }
  .module:hover .m-body{ filter:brightness(1.06); }
  #momo-g{ transition:transform .55s cubic-bezier(.45,1.4,.55,1); will-change:transform; }
  #momo-inner.hop{ animation:hop .55s ease both; }
  @keyframes hop{ 0%{transform:translateY(0) scaleY(1);} 35%{transform:translateY(-42px) scaleY(1.06);} 75%{transform:translateY(2px) scaleY(.92);} 100%{transform:translateY(0) scaleY(1);} }
  .m-eyes{ transform-box:fill-box; transform-origin:center; animation:blink 5.2s infinite; }
  @keyframes blink{ 0%,93%,100%{ transform:scaleY(1);} 96%{ transform:scaleY(.08);} }
  .tail{ transform-box:fill-box; transform-origin:10% 90%; animation:sway 3.4s ease-in-out infinite; }
  @keyframes sway{ 0%,100%{ transform:rotate(0deg);} 50%{ transform:rotate(9deg);} }
  .cloud{ animation:drift 70s linear infinite; }
  .cloud.c2{ animation-duration:95s; animation-delay:-40s; }
  @keyframes drift{ from{ transform:translateX(-250px);} to{ transform:translateX(1050px);} }

  /* ---------- HUD ---------- */
  #hud{ position:absolute; top:0; left:50%; transform:translateX(-50%);
        width:min(620px,100%); padding:calc(10px + env(safe-area-inset-top)) 12px 0;
        display:flex; align-items:flex-start; gap:8px; z-index:5; pointer-events:none; }
  #hud > *{ pointer-events:auto; }
  .pill{ display:flex; align-items:center; gap:7px; background:var(--cream);
         border:3px solid var(--cream-line); border-radius:999px; padding:5px 14px 5px 6px;
         box-shadow:0 3px 0 rgba(110,82,60,.18); }
  .pill svg{ width:26px; height:26px; }
  .pill b{ font-size:15px; font-weight:900; color:var(--ink); font-variant-numeric:tabular-nums; letter-spacing:.2px; }
  .pill small{ font-size:10px; font-weight:800; color:#B4A98F; display:block; line-height:1; margin-top:1px; letter-spacing:.4px; }
  #hud .spacer{ flex:1; }
  .hud-btn{ width:44px; height:44px; border-radius:15px; background:rgba(255,255,255,.92);
            border:3px solid rgba(255,255,255,0); box-shadow:0 3px 0 rgba(46,90,115,.25);
            display:grid; place-items:center; transition:transform .12s; }
  .hud-btn:active{ transform:scale(.9); }
  .hud-btn svg{ width:22px; height:22px; stroke:#47A5D6; stroke-width:2.6; fill:none; stroke-linecap:round; stroke-linejoin:round; }

  /* ---------- speech bubble ---------- */
  #bubble{ position:absolute; left:50%; top:calc(74px + env(safe-area-inset-top));
           transform:translateX(-50%) scale(.6); max-width:min(78vw,340px); z-index:4;
           background:#FFFDF4; border:3px solid var(--cream-line); border-radius:18px;
           padding:9px 14px; font-size:13.5px; font-weight:800; color:var(--ink); text-align:center;
           box-shadow:0 4px 0 rgba(110,82,60,.15); opacity:0; pointer-events:none;
           transition:opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1); }
  #bubble.show{ opacity:1; transform:translateX(-50%) scale(1); }
  #bubble::after{ content:""; position:absolute; left:50%; bottom:-11px; margin-left:-8px;
                  border:8px solid transparent; border-top-color:var(--cream-line); }

  /* ---------- bottom sheet ---------- */
  #sheet{ position:absolute; bottom:0; left:50%; transform:translateX(-50%);
          width:min(620px,100%); z-index:6; display:flex; flex-direction:column; }
  #panel{ background:var(--panel); border-radius:26px 26px 0 0; padding:10px 10px 4px;
          box-shadow:0 -4px 24px rgba(30,90,120,.25); }
  #panel::before{ content:""; display:block; width:44px; height:5px; border-radius:3px;
                  background:rgba(255,255,255,.55); margin:0 auto 8px; }
  .tabpane{ max-height:min(34dvh,320px); overflow-y:auto; display:flex; flex-direction:column; gap:8px;
            padding:2px 2px 8px; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.6) transparent; }
  .tabpane.hidden{ display:none; }

  .card{ display:flex; align-items:center; gap:10px; background:var(--card);
         border-radius:20px; padding:8px 10px; box-shadow:0 3px 0 var(--panel-deep); }
  .card .thumb{ flex:none; width:58px; height:58px; border-radius:15px; border:2.5px solid #F0E4CC;
                display:grid; place-items:center; background:linear-gradient(#FDF8EC, #F6EBD3); }
  .card .thumb svg{ width:50px; height:50px; }
  .card .info{ flex:1; min-width:0; }
  .card .info h3{ margin:0; font-size:15px; font-weight:800; color:var(--title); letter-spacing:.1px; }
  .card .info h3 span{ font-size:11px; color:#B9C6CC; font-weight:800; margin-left:5px; }
  .card .info p{ margin:2px 0 0; font-size:11.5px; line-height:1.35; font-weight:600; color:var(--body); }
  .card .buy{ flex:none; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .price-chip{ display:flex; align-items:center; gap:4px; font-size:12.5px; font-weight:900;
               color:var(--ink); font-variant-numeric:tabular-nums; }
  .price-chip svg{ width:15px; height:15px; }
  .add-btn{ width:54px; height:40px; border-radius:14px; background:var(--mint);
            box-shadow:0 3px 0 var(--mint-deep); display:grid; place-items:center;
            transition:transform .12s, filter .2s; }
  .add-btn svg{ width:20px; height:20px; stroke:#fff; stroke-width:3.4; fill:none; stroke-linecap:round; }
  .add-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--mint-deep); }
  .card.disabled{ opacity:.55; }
  .card.disabled .add-btn{ filter:saturate(.15) brightness(1.05); cursor:not-allowed; }
  .card.shake{ animation:shake .4s; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 65%{transform:translateX(5px);} }

  /* presets */
  .preset-card{ display:flex; align-items:center; gap:12px; background:var(--card);
                border-radius:20px; padding:10px 12px; box-shadow:0 3px 0 var(--panel-deep); }
  .preset-card .mini{ flex:none; width:96px; height:76px; border-radius:14px; border:2.5px solid var(--card-line);
                      background:linear-gradient(#EAF7F0 60%, #D8EFC9 60%); overflow:hidden; }
  .preset-card .mini svg{ width:100%; height:100%; }
  .preset-card h3{ margin:0; font-size:15px; font-weight:800; color:var(--title); }
  .preset-card p{ margin:2px 0 0; font-size:11.5px; font-weight:600; color:var(--body); }
  .build-btn{ flex:none; background:var(--mint); box-shadow:0 3px 0 var(--mint-deep); color:#fff;
              font-size:13px; font-weight:900; border-radius:14px; padding:10px 14px; letter-spacing:.2px;
              transition:transform .12s; }
  .build-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--mint-deep); }

  /* order */
  #order-list{ background:var(--card); border-radius:20px; padding:6px 14px; box-shadow:0 3px 0 var(--panel-deep); }
  .o-row{ display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:2px dashed #EDF3F0; }
  .o-row:last-child{ border-bottom:none; }
  .o-row .o-ic{ width:30px; height:30px; flex:none; }
  .o-row .o-name{ flex:1; font-size:13.5px; font-weight:800; color:var(--ink); }
  .o-row .o-name em{ font-style:normal; color:#ADB8B4; font-size:12px; margin-left:4px; }
  .o-row .o-price{ font-size:13.5px; font-weight:900; color:var(--ink); font-variant-numeric:tabular-nums; }
  .o-row.total .o-name{ font-size:15px; }
  .o-row.total .o-price{ font-size:17px; color:var(--title); }
  .o-row.disc .o-name, .o-row.disc .o-price{ color:#E07856; }
  .o-empty{ text-align:center; font-size:13px; font-weight:700; color:#7FA8BF; background:rgba(255,255,255,.25);
            border:2.5px dashed rgba(255,255,255,.7); border-radius:18px; padding:22px 16px; color:#fff; }
  #order-cta{ margin-top:8px; width:100%; background:#FF9A5C; box-shadow:0 4px 0 #E0793C; color:#fff;
              font-size:16px; font-weight:900; border-radius:18px; padding:14px; letter-spacing:.3px;
              transition:transform .12s; }
  #order-cta:active{ transform:translateY(2px); box-shadow:0 2px 0 #E0793C; }
  .o-note{ margin:8px 4px 2px; font-size:11px; line-height:1.45; font-weight:700; color:rgba(255,255,255,.85); text-align:center; }

  /* dock */
  #dock{ display:flex; background:var(--dock); padding:8px 14px calc(10px + env(safe-area-inset-bottom)); gap:8px; }
  .tab{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 0 5px;
        border-radius:16px; transition:background .2s; }
  .tab svg{ width:26px; height:26px; stroke:rgba(255,255,255,.9); fill:none; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round; }
  .tab span{ font-size:10.5px; font-weight:800; color:rgba(255,255,255,.9); letter-spacing:.3px; }
  .tab.active{ background:#fff; box-shadow:0 3px 0 rgba(0,60,90,.18); }
  .tab.active svg{ stroke:var(--panel); }
  .tab.active span{ color:var(--panel); }
  .tab .badge{ position:absolute; }

  /* confirm overlay */
  #overlay{ position:fixed; inset:0; background:rgba(36,66,82,.5); z-index:20; display:grid; place-items:center;
            padding:20px; opacity:0; pointer-events:none; transition:opacity .25s; }
  #overlay.show{ opacity:1; pointer-events:auto; }
  #overlay .sheet-card{ background:#FFFDF4; border:4px solid var(--cream-line); border-radius:28px;
            width:min(400px,100%); padding:22px 20px 18px; text-align:center;
            transform:scale(.7); transition:transform .3s cubic-bezier(.34,1.56,.64,1);
            box-shadow:0 10px 0 rgba(110,82,60,.2); }
  #overlay.show .sheet-card{ transform:scale(1); }
  .sheet-card svg{ width:92px; height:92px; }
  .sheet-card h2{ margin:6px 0 4px; font-size:21px; font-weight:900; color:var(--ink); }
  .sheet-card .sum{ font-size:15px; font-weight:800; color:var(--title); margin:0 0 10px; }
  .sheet-card p{ margin:0 0 14px; font-size:12.5px; line-height:1.5; font-weight:700; color:var(--body); }
  .sheet-card button{ background:var(--mint); box-shadow:0 4px 0 var(--mint-deep); color:#fff; width:100%;
            font-size:15px; font-weight:900; border-radius:16px; padding:13px; }
  .sheet-card button:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--mint-deep); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>


<div id="app">
  <div id="scene-wrap">
    <svg id="scene" viewBox="0 0 800 660" preserveAspectRatio="xMidYMid meet" aria-label="Сборка домика Котоши на лужайке">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#BEE3F2"/><stop offset="1" stop-color="#E2F2E0"/>
        </linearGradient>
        <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ABD47E"/><stop offset="1" stop-color="#84B656"/>
        </linearGradient>
        <linearGradient id="woodTop" x1="0" y1="0" x2=".6" y2="1">
          <stop offset="0" stop-color="#F6E2B4"/><stop offset="1" stop-color="#E8CA8E"/>
        </linearGradient>
        <linearGradient id="woodR" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#E9C48C"/><stop offset="1" stop-color="#D5A96C"/>
        </linearGradient>
        <linearGradient id="woodL" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#DAB279"/><stop offset="1" stop-color="#C39355"/>
        </linearGradient>
        <linearGradient id="woodPost" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#D9B078"/><stop offset=".5" stop-color="#E9C990"/><stop offset="1" stop-color="#C89A5E"/>
        </linearGradient>
        <radialGradient id="hole" cx=".4" cy=".38" r=".9">
          <stop offset="0" stop-color="#2E2620"/><stop offset="1" stop-color="#4E3C2E"/>
        </radialGradient>
        <radialGradient id="cushion" cx=".42" cy=".34" r="1">
          <stop offset="0" stop-color="#F9DAD3"/><stop offset="1" stop-color="#EDAFA4"/>
        </radialGradient>
        <linearGradient id="roofG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#EE9166"/><stop offset="1" stop-color="#D4653C"/>
        </linearGradient>
        <radialGradient id="momoB" cx=".42" cy=".3" r="1">
          <stop offset="0" stop-color="#FFFDF6"/><stop offset="1" stop-color="#EFE0C8"/>
        </radialGradient>
        <radialGradient id="lawnGlow" cx=".5" cy=".5" r=".5">
          <stop offset="0" stop-color="#DFF0BB" stop-opacity=".9"/><stop offset="1" stop-color="#DFF0BB" stop-opacity="0"/>
        </radialGradient>
        <pattern id="plyP" width="6" height="7" patternUnits="userSpaceOnUse">
          <rect width="6" height="7" fill="none"/>
          <rect y="1.4" width="6" height="1.7" fill="#B4884E" opacity=".5"/>
          <rect y="4.9" width="6" height="1.1" fill="#EBD3A2" opacity=".55"/>
        </pattern>
        <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="7"/>
        </filter>
        <filter id="grainF">
          <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0"/>
        </filter>
      </defs>
      <rect x="-2000" y="-2000" width="4800" height="2290" fill="url(#sky)"/>
      <g class="cloud"><ellipse cx="120" cy="80" rx="52" ry="20" fill="#fff" opacity=".92"/><ellipse cx="160" cy="68" rx="34" ry="16" fill="#fff" opacity=".92"/></g>
      <g class="cloud c2"><ellipse cx="60" cy="150" rx="40" ry="15" fill="#fff" opacity=".8"/></g>
      <rect x="-2000" y="210" width="4800" height="2600" fill="url(#grass)"/>
      <g id="bg-deco"></g>
      <g id="world" transform="translate(62,-84) scale(.82)">
        <g id="house"></g>
        <g id="momo-g"><g id="momo-inner"></g></g>
      </g>
      <rect x="-2000" y="-2000" width="4800" height="4800" filter="url(#grainF)"
            style="mix-blend-mode:overlay;opacity:.12;pointer-events:none"/>
    </svg>
  </div>

  <header id="hud">
    <div class="pill" id="price-pill" title="Итого">
      <svg viewBox="0 0 26 26"><circle cx="13" cy="13" r="12" fill="#F7C948" stroke="#D9A521" stroke-width="2"/><text x="13" y="18" text-anchor="middle" font-size="13" font-weight="900" fill="#8A6510" font-family="inherit">₽</text></svg>
      <div><b id="hud-price">0 ₽</b><small>ИТОГО</small></div>
    </div>
    <div class="pill" title="Модулей в сборке">
      <svg viewBox="0 0 26 26"><rect x="4" y="8" width="18" height="14" rx="3" fill="#DFBB85" stroke="#6E523C" stroke-width="2"/><circle cx="13" cy="15" r="4" fill="#4A3A32"/></svg>
      <div><b id="hud-count">0/12</b><small>МОДУЛИ</small></div>
    </div>
    <div class="spacer"></div>
    <button class="hud-btn" id="btn-reset" title="Начать заново" aria-label="Начать заново">
      <svg viewBox="0 0 24 24"><path d="M4 10a8 8 0 0 1 14-4l2 2M20 4v4h-4M20 14a8 8 0 0 1-14 4l-2-2M4 20v-4h4"/></svg>
    </button>
  </header>

  <div id="bubble" role="status" aria-live="polite"></div>

  <section id="sheet">
    <div id="panel">
      <div id="tab-modules" class="tabpane"></div>
      <div id="tab-presets" class="tabpane hidden"></div>
      <div id="tab-order" class="tabpane hidden"></div>
    </div>
    <nav id="dock" aria-label="Разделы">
      <button class="tab active" data-tab="modules" style="position:relative">
        <svg viewBox="0 0 24 24"><path d="M4 8.5 12 4l8 4.5v7L12 20l-8-4.5z"/><path d="M4 8.5 12 13l8-4.5M12 13v7"/></svg>
        <span>Модули</span>
      </button>
      <button class="tab" data-tab="presets" style="position:relative">
        <svg viewBox="0 0 24 24"><path d="M3.5 11 12 4l8.5 7"/><path d="M6 10v9h12v-9"/><path d="M10 19v-5h4v5"/></svg>
        <span>Готовые</span>
      </button>
      <button class="tab" data-tab="order" style="position:relative">
        <svg viewBox="0 0 24 24"><path d="M4 9h16l-1.6 10a2 2 0 0 1-2 1.7H7.6a2 2 0 0 1-2-1.7z"/><path d="M8.5 9 12 3.5 15.5 9"/></svg>
        <span>Заказ</span>
      </button>
    </nav>
  </section>

  <div id="overlay">
    <div class="sheet-card">
      <svg viewBox="-60 -105 120 110" id="ov-momo"></svg>
      <h2>Заявка собрана!</h2>
      <p class="sum" id="ov-sum"></p>
      <p id="ov-note">Момо запишет состав и передаст мастерской — как на основном сайте, заявка улетает в Telegram. Это прототип: кнопка пока ничего не отправляет.</p>
      <button id="ov-close">Отлично</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ================= каталог (реальные модули и цены Котоши) ================= */
const MODULES = {
  base:   { name:"Куб-нора", jp:"はこ", price:4990, h:80, perch:false,
    desc:"Базовый модуль: фанерный куб с круглым лазом. С него начинается любой Котоши.",
    needsSupport:false, supportsAbove:true,
    say:["О! Куб. Заезжаю немедленно.","Нора — это святое.","Пахнет свежей фанерой. Одобряю."] },
  lounge: { name:"Лежанка", jp:"ざぶとん", price:5990, h:36, perch:true,
    desc:"Открытая лежанка с мягкой подушкой. Ставится на пол или на крышу куба.",
    needsSupport:false, supportsAbove:true,

  tunnel: { name:"Тоннель", jp:"トンネル", price:2490, h:56, perch:false,
    desc:"Сквозной тоннель для засад и пробежек. Соединяет модули по горизонтали.",
    needsSupport:false, supportsAbove:false,
    say:["Тоннель — идеальное место для засады.","Туда-сюда. Туда-сюда. Гениально.","Никто не заметит меня здесь. Никто."] },
  tower:  { name:"Башня", jp:"タワー", price:3990, h:78, perch:true,
    desc:"Смотровая площадка на колонне. Ставится на куб или лежанку — коту нужна высота.",
    needsSupport:true, supportsAbove:true,
    say:["Выше! Ещё выше! Я должен видеть всё.","С высоты люди выглядят… управляемо.","Моя башня. Моё королевство."] },
  hammock:{ name:"Гамак", jp:"ハンモック", price:1990, h:80, perch:true,
    desc:"Подвесной гамак на раме. Крепится над любым закрытым модулем.",
    needsSupport:true, supportsAbove:false,
    say:["Качается! Это лучший день в моей жизни.","Гамак — это лежанка для продвинутых.","Буду качаться и осуждать."] },
  roof:   { name:"Крыша", jp:"やね", price:1490, h:60, perch:false,
    desc:"Двускатная крыша-чердак. Завершает постройку — ставится только сверху.",
    needsSupport:true, supportsAbove:false,

/* ================= состояние ================= */
let grid = new Array(MAX).fill(null);
let shownPrice = 0, hadDiscount = false, bubbleTimer = null;

const $ = s => document.querySelector(s);
const idx = (c,r)=> r*COLS+c;
const count = ()=> grid.filter(Boolean).length;
function totals(){
  const sub = grid.reduce((s,t)=> s+(t?MODULES[t].price:0), 0);
  const disc = count()>=DISCOUNT_FROM ? Math.round(sub*DISCOUNT) : 0;
  return { sub, disc, total: sub-disc };
}
function canPlace(type,c,r){
  if(grid[idx(c,r)]) return false;
  const m=MODULES[type];
  if(r===0) return !m.needsSupport;
  const below=grid[idx(c,r-1)];
  return !!below && MODULES[below].supportsAbove;
}
function findSlot(type){
  let best=null, bestScore=1e9;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!canPlace(type,c,r)) continue;
    const nearOcc = [ [c-1,r],[c+1,r],[c,r-1] ].some(([cc,rr])=> cc>=0&&cc<COLS&&rr>=0&&grid[idx(cc,rr)]);
    const score = r*100 + (nearOcc?0:40) + Math.abs(c-1.4)*10;
    if(score<bestScore){ bestScore=score; best={c,r}; }
  }
  return best;
}
/* экранная позиция модуля: колонки набирают высоту по факту */
function stackY(c,r){
  const {y} = colXY(c);
  let off=0;
  for(let rr=0;rr<r;rr++){ const t=grid[idx(c,rr)]; off += t? MODULES[t].h : WALL; }
  return y-off;
}

/* ================= отрисовка ================= */
function renderHouse(popCell){
  const g=$("#house");
  let s="";
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS;r++){
      const t=grid[idx(c,r)];
      if(!t) continue;
      const {x}=colXY(c), gy=stackY(c,r);
      const pop = popCell===idx(c,r) ? " pop":"";
      const shadow = r===0 ? `<ellipse cx="${x}" cy="${gy+H2-4}" rx="86" ry="26" fill="#3E637C" opacity=".15" filter="url(#soft)"/>` : "";
      s+=`<g class="module${pop}" data-cell="${idx(c,r)}" tabindex="0" role="button" aria-label="Убрать: ${MODULES[t].name}">${shadow}${DRAW[t](x,gy)}</g>`;
    }
  }
  g.innerHTML=s;
  g.querySelectorAll(".module").forEach(el=>{
    el.addEventListener("click", ()=> removeAt(+el.dataset.cell));
    el.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); removeAt(+el.dataset.cell);} });
  });
}
function momoTo(cell){
  const mg=$("#momo-g");
  let x=636, y=470, scale=1;                       /* лужайка по умолчанию */
  if(cell!=null && grid[cell]){
    const c=cell%COLS, r=(cell-c)/COLS, t=grid[cell], m=MODULES[t];
    const {x:cx}=colXY(c); const gy=stackY(c,r);
    if(m.perch){ x=cx; y=gy-m.h+(t==="hammock"?52:(t==="lounge"?12:6)); scale=.82; }
    else { x=cx+30; y=gy+H2+6; scale=.85; }
  } else if(count()>0){
    /* сидит рядом с домом */
    x=ORIGIN.x-130; y=ORIGIN.y+50;
  }
  mg.style.transform=`translate(${x}px, ${y}px) scale(${scale})`;
  const inner=$("#momo-inner");
  inner.classList.remove("hop"); void inner.getBoundingClientRect(); inner.classList.add("hop");
}
function say(lines){
  const b=$("#bubble");
  b.textContent = Array.isArray(lines)? lines[Math.floor(Math.random()*lines.length)] : lines;
  b.classList.add("show");
  clearTimeout(bubbleTimer);
  bubbleTimer=setTimeout(()=> b.classList.remove("show"), 3400);
}
let priceRaf=0;
function tickPrice(){
  const { total } = totals();
  const from=shownPrice, to=total, t0=performance.now();
  cancelAnimationFrame(priceRaf);
  const step=now=>{
    const k=Math.max(0, Math.min(1,(now-t0)/380));
    shownPrice=Math.round(from+(to-from)*(1-Math.pow(1-k,3)));
    $("#hud-price").textContent=fmt(shownPrice);
    if(k<1) priceRaf=requestAnimationFrame(step);
  };
  priceRaf=requestAnimationFrame(step);
  $("#hud-count").textContent=`${count()}/${MAX}`;
}

/* карточка-миниатюра модуля */
const thumbSVG = t => `<svg viewBox="-92 -160 184 216" aria-hidden="true">${DRAW[t](0,20)}</svg>`;
const coin = `<svg viewBox="0 0 26 26"><circle cx="13" cy="13" r="11.5" fill="#F7C948" stroke="#D9A521" stroke-width="2"/><text x="13" y="17.6" text-anchor="middle" font-size="12" font-weight="900" fill="#8A6510" font-family="inherit">₽</text></svg>`;

function renderCards(){
  const pane=$("#tab-modules");
  pane.innerHTML = Object.entries(MODULES).map(([t,m])=>{
    const ok=!!findSlot(t);
    return `<div class="card${ok?"":" disabled"}" data-type="${t}">
      <div class="thumb">${thumbSVG(t)}</div>
      <div class="info"><h3>${m.name}<span>${m.jp}</span></h3><p>${m.desc}</p></div>
      <div class="buy">
        <span class="price-chip">${coin}${fmt(m.price)}</span>
        <button class="add-btn" aria-label="Добавить: ${m.name} за ${fmt(m.price)}">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </div>`;
  }).join("");
  pane.querySelectorAll(".card").forEach(card=>{
    card.querySelector(".add-btn").addEventListener("click", ()=> addModule(card.dataset.type, card));
  });
}
function renderPresets(){
  $("#tab-presets").innerHTML = Object.entries(PRESETS).map(([k,p])=>{
    const price=Object.values(p.cells).reduce((s,t)=>s+MODULES[t].price,0);
    const mini = miniScene(p.cells);
    return `<div class="preset-card">
      <div class="mini">${mini}</div>
      <div class="info" style="flex:1;min-width:0">
        <h3>«${p.name}»</h3><p>${p.desc}</p>
        <span class="price-chip" style="margin-top:4px">${coin}${fmt(price)}</span>
      </div>
      <button class="build-btn" data-preset="${k}">Собрать</button>
    </div>`;
  }).join("");
  document.querySelectorAll(".build-btn").forEach(b=>
    b.addEventListener("click", ()=> buildPreset(b.dataset.preset)));
}
function miniScene(cells){
  const tmp=new Array(MAX).fill(null);
  Object.entries(cells).forEach(([i,t])=> tmp[+i]=t);
  const save=grid; grid=tmp;
  let s="";
  for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
    const t=grid[idx(c,r)]; if(!t) continue;
    s+=DRAW[t](colXY(c).x, stackY(c,r));
  }
  grid=save;
  return `<svg viewBox="150 100 440 420" aria-hidden="true">${s}</svg>`;
}
function renderOrder(){
  const pane=$("#tab-order");
  const { sub, disc, total } = totals();
  if(!count()){
    pane.innerHTML=`<div class="o-empty">Пока пусто. Добавьте модули —<br>здесь соберётся заказ.</div>`;
    return;
  }
  const byType={};
  grid.forEach(t=>{ if(t) byType[t]=(byType[t]||0)+1; });
  const rows=Object.entries(byType).map(([t,n])=>`
    <div class="o-row">
      <span class="o-ic"><svg viewBox="-92 -160 184 216">${DRAW[t](0,20)}</svg></span>
      <span class="o-name">${MODULES[t].name}${n>1?`<em>× ${n}</em>`:""}</span>
      <span class="o-price">${fmt(MODULES[t].price*n)}</span>
    </div>`).join("");
  pane.innerHTML=`
    <div id="order-list">
      ${rows}
      ${disc?`<div class="o-row disc"><span class="o-name">Скидка за ${count()} модулей (−5%)</span><span class="o-price">−${fmt(disc)}</span></div>`:""}
      <div class="o-row total"><span class="o-name">Итого</span><span class="o-price">${fmt(total)}</span></div>
    </div>
    <button id="order-cta">Оформить заказ · ${fmt(total)}</button>
    <p class="o-note">Все модули — берёзовая фанера, готовы к производству.<br>Заявку принимает Момо и передаёт мастерской.</p>`;
  $("#order-cta").addEventListener("click", ()=>{
    $("#ov-sum").textContent=`${count()} ${plural(count())} · ${fmt(total)}`;
    $("#overlay").classList.add("show");
  });
}
const plural = n => n===1?"модуль":(n<5?"модуля":"модулей");

/* ================= действия ================= */
function addModule(type, cardEl){
  const slot=findSlot(type);
  if(!slot){
    if(cardEl){ cardEl.classList.remove("shake"); void cardEl.offsetWidth; cardEl.classList.add("shake"); }
    say(SAY.noSlot); return;
  }
  const wasDisc = count()>=DISCOUNT_FROM;
  grid[idx(slot.c,slot.r)]=type;
  renderHouse(idx(slot.c,slot.r));
  momoTo(idx(slot.c,slot.r));
  const n=count();
  if(!wasDisc && n>=DISCOUNT_FROM) say(SAY.discount);
  else if(n>=8 && Math.random()<.4) say(SAY.bigHouse);
  else say(MODULES[type].say);
  refresh();
}
function removeAt(cell){
  const c=cell%COLS, r=(cell-c)/COLS;
  if(r+1<ROWS && grid[idx(c,r+1)]){ say(SAY.blocked); return; }
  grid[cell]=null;
  renderHouse();
  momoTo(null);
  say(count()? SAY.removed : SAY.empty);
  refresh();
}
function buildPreset(key){
  grid=new Array(MAX).fill(null);
  const entries=Object.entries(PRESETS[key].cells)
    .map(([i,t])=>[+i,t]).sort((a,b)=> (a[0]/COLS|0)-(b[0]/COLS|0));
  entries.forEach(([i,t],n)=>{
    setTimeout(()=>{
      grid[i]=t;
      renderHouse(i);
      if(n===entries.length-1){ momoTo(i); say(MODULES[t].say); }
      refresh();
    }, n*260);
  });
  switchTab("modules");
}
function refresh(){ tickPrice(); renderCards(); renderOrder(); }

function switchTab(name){
  document.querySelectorAll(".tab").forEach(b=> b.classList.toggle("active", b.dataset.tab===name));
  ["modules","presets","order"].forEach(t=> $("#tab-"+t).classList.toggle("hidden", t!==name));
}

/* ================= init ================= */
$("#bg-deco").innerHTML=bgDeco();
$("#momo-inner").innerHTML=momoSVG();
$("#ov-momo").innerHTML=momoSVG();
document.querySelectorAll(".tab").forEach(b=> b.addEventListener("click", ()=> switchTab(b.dataset.tab)));
$("#btn-reset").addEventListener("click", ()=>{
  if(!count()) { say(SAY.empty); return; }
  grid=new Array(MAX).fill(null);
  renderHouse(); momoTo(null); say(SAY.empty); refresh();
});
$("#ov-close").addEventListener("click", ()=> $("#overlay").classList.remove("show"));
$("#overlay").addEventListener("click", e=>{ if(e.target.id==="overlay") $("#overlay").classList.remove("show"); });

renderHouse(); renderCards(); renderPresets(); renderOrder(); tickPrice();
momoTo(null);
setTimeout(()=> say(SAY.hello), 700);
/* стартовая сборка «Старт» — сцена не должна быть пустой при первом взгляде */
setTimeout(()=> buildPreset("start"), 1600);
</script>

</body>
</html>
